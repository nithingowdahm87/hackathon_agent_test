networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
services:
  backend_java/alert_service:
    build: ./backend_java/alert_service
    depends_on:
    - backend_java/gateway_service
    environment:
    - GATEWAY_SERVICE_URL=${GATEWAY_SERVICE_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8091/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8091:8091
  backend_java/auth_service:
    build: ./backend_java/auth_service
    depends_on:
    - postgres
    environment:
    - DATABASE_URL=${DATABASE_URL}
    - DATABASE_USER=${DATABASE_USER}
    - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8090/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8090:8090
  backend_java/cctv_service:
    build: ./backend_java/cctv_service
    depends_on:
    - backend_java/gateway_service
    environment:
    - GATEWAY_SERVICE_URL=${GATEWAY_SERVICE_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8094/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8094:8094
  backend_java/gateway_service:
    build: ./backend_java/gateway_service
    depends_on:
    - backend_java/auth_service
    - redis
    environment:
    - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
    - REDIS_URL=${REDIS_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8081/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8081:8081
  backend_java/power_service:
    build: ./backend_java/power_service
    depends_on:
    - backend_java/gateway_service
    environment:
    - GATEWAY_SERVICE_URL=${GATEWAY_SERVICE_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8093/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8093:8093
  backend_java/trafficservice:
    build: ./backend_java/trafficservice
    depends_on:
    - backend_java/gateway_service
    environment:
    - GATEWAY_SERVICE_URL=${GATEWAY_SERVICE_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8092/healthcheck
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8092:8092
  frontend_reactjs:
    build: ./frontend_reactjs
    depends_on:
    - backend_java/gateway_service
    environment:
    - REACT_APP_API_URL=${REACT_APP_API_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:3000
      timeout: 5s
    networks:
    - frontend-net
    ports:
    - 3000:3000
  nginx:
    depends_on:
    - frontend_reactjs
    - python
    image: nginx:1.21
    networks:
    - frontend-net
    ports:
    - 80:80
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
  postgres:
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - pg_isready
      - -U
      - ${POSTGRES_USER}
      timeout: 5s
    image: postgres:13
    networks:
    - backend-net
    volumes:
    - postgres-data:/var/lib/postgresql/data
  python:
    build: ./python
    depends_on:
    - backend_java/gateway_service
    environment:
    - PYTHON_API_URL=${PYTHON_API_URL}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - curl
      - -f
      - http://localhost:8000
      timeout: 5s
    networks:
    - backend-net
    ports:
    - 8000:8000
  redis:
    environment:
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - redis-cli
      - ping
      timeout: 5s
    image: redis:6
    networks:
    - backend-net
    volumes:
    - redis-data:/data
version: '3.8'
volumes:
  postgres-data: null
  redis-data: null
